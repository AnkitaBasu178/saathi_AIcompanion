services:
  saathi-api:
    build: .
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      - MONGODB_URI=MONGODB_URI=mongodb://saathi_admin:sathi123@localhost:27017/saathi?authSource=admin
      - DEMO_MODE=true
      - NODE_ENV=production
    depends_on:
      mongo:
        condition: service_healthy
    restart: unless-stopped

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    environment:
      - MONGO_INITDB_ROOT_USERNAME=saathi_admin
      - MONGO_INITDB_ROOT_PASSWORD=sathi123
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: mongosh --eval "db.adminCommand('ping')"
      interval: 10s
      timeout: 5s
      retries: 3

  mongo-express:
    image: mongo-express
    ports:
      - "8081:8081"
    environment:
      - ME_CONFIG_MONGODB_ADMINUSERNAME=saathi_admin
      - ME_CONFIG_MONGODB_ADMINPASSWORD=sathi123
      - ME_CONFIG_MONGODB_URL=mongodb://saathi_admin:sathi123@mongo:27017/?authSource=admin
    depends_on:
      - mongo

volumes:
  mongo_data: