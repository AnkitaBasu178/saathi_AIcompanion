openapi: 3.0.3
info:
  title: SAATHI API
  description: |
    **SAATHI** — AI-powered safety and life companion for women.

    This API processes user messages through a 5-stage AI pipeline:
    1. Conversation Context
    2. Situation Classification
    3. Risk Assessment
    4. Guided Action Planning
    5. Support Connection & Emergency Routing

    ## Authentication
    Anonymous session-based. Send `x-session-id` header or one will be auto-generated.

    ## Demo Mode
    When `DEMO_MODE=true`, the system returns deterministic responses for demo scenarios without needing an LLM API key.
  version: 1.0.0
  contact:
    name: SAATHI Team

servers:
  - url: http://localhost:3000
    description: Local development

tags:
  - name: Health Check
    description: Server status
  - name: Chat
    description: AI conversation pipeline
  - name: Support
    description: Nearby support services
  - name: Emergency
    description: SOS and emergency contacts
  - name: Incidents
    description: Incident documentation
  - name: Health Info
    description: Health and wellness knowledge base

paths:
  /api/ping:
    get:
      tags: [Health Check]
      summary: Health check
      responses:
        '200':
          description: Server is running
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                  timestamp:
                    type: string
                    example: '2025-01-01T00:00:00.000Z'
                  demo_mode:
                    type: boolean

  /api/chat/message:
    post:
      tags: [Chat]
      summary: Send a chat message through the 5-stage AI pipeline
      description: |
        Processes the message through:
        1. Context retrieval and management
        2. Situation classification (health, harassment, domestic violence, etc.)
        3. Risk assessment (green/yellow/red)
        4. Action plan generation
        5. Support connection and emergency routing
      parameters:
        - in: header
          name: x-session-id
          schema:
            type: string
          description: Anonymous session ID (auto-generated if not provided)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [message]
              properties:
                message:
                  type: string
                  example: I have period pain
                  maxLength: 2000
                location:
                  type: object
                  properties:
                    lat:
                      type: number
                      example: 28.6139
                    lon:
                      type: number
                      example: 77.2090
      responses:
        '200':
          description: Structured AI response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChatResponse'
        '400':
          description: Invalid input
        '429':
          description: Rate limited

  /api/chat/history:
    get:
      tags: [Chat]
      summary: Get conversation history for current session
      parameters:
        - in: header
          name: x-session-id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Conversation history
          content:
            application/json:
              schema:
                type: object
                properties:
                  messages:
                    type: array
                    items:
                      type: object
                      properties:
                        role:
                          type: string
                          enum: [user, assistant]
                        content:
                          type: string
                        timestamp:
                          type: string
                  summary:
                    type: string
                  category:
                    type: string
                  riskLevel:
                    type: string

  /api/support/nearby:
    get:
      tags: [Support]
      summary: Find nearby support services
      parameters:
        - in: query
          name: lat
          required: true
          schema:
            type: number
          example: 28.6139
        - in: query
          name: lon
          required: true
          schema:
            type: number
          example: 77.2090
        - in: query
          name: type
          schema:
            type: string
            enum: [hospital, police_station, women_helpline, ngo, counsellor, shelter]
          description: Filter by service type (omit for all types)
        - in: query
          name: radius
          schema:
            type: number
            default: 10
          description: Search radius in km
      responses:
        '200':
          description: Nearby services
          content:
            application/json:
              schema:
                type: object
                properties:
                  services:
                    type: array
                    items:
                      $ref: '#/components/schemas/SupportService'

  /api/emergency/sos:
    post:
      tags: [Emergency]
      summary: Trigger SOS emergency response
      description: Finds nearest emergency services and retrieves emergency contacts
      parameters:
        - in: header
          name: x-session-id
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                lat:
                  type: number
                  example: 28.6139
                lon:
                  type: number
                  example: 77.2090
      responses:
        '200':
          description: Emergency response with nearest services
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmergencyResponse'

  /api/emergency/contacts:
    post:
      tags: [Emergency]
      summary: Save emergency contacts
      parameters:
        - in: header
          name: x-session-id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [contacts]
              properties:
                contacts:
                  type: array
                  items:
                    type: object
                    required: [name, phone]
                    properties:
                      name:
                        type: string
                        example: Mom
                      phone:
                        type: string
                        example: '9876543210'
                      relationship:
                        type: string
                        example: Mother
      responses:
        '200':
          description: Contacts saved
    get:
      tags: [Emergency]
      summary: Get emergency contacts
      parameters:
        - in: header
          name: x-session-id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Emergency contacts
          content:
            application/json:
              schema:
                type: object
                properties:
                  contacts:
                    type: array
                    items:
                      type: object
                      properties:
                        name:
                          type: string
                        phone:
                          type: string
                        relationship:
                          type: string
                        isPrimary:
                          type: boolean

  /api/incidents/report:
    post:
      tags: [Incidents]
      summary: Create an encrypted incident report
      description: Description is encrypted using AES-256 before storage
      parameters:
        - in: header
          name: x-session-id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [description]
              properties:
                description:
                  type: string
                  example: Incident details here
                date:
                  type: string
                  format: date
                time:
                  type: string
                  example: '14:30'
                location:
                  type: object
                  properties:
                    lat:
                      type: number
                    lon:
                      type: number
                    address:
                      type: string
                media_url:
                  type: string
      responses:
        '200':
          description: Report saved
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  reportId:
                    type: string
                  message:
                    type: string

  /api/incidents/reports:
    get:
      tags: [Incidents]
      summary: Get incident reports for session (decrypted)
      parameters:
        - in: header
          name: x-session-id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Decrypted incident reports
          content:
            application/json:
              schema:
                type: object
                properties:
                  reports:
                    type: array
                    items:
                      type: object

  /api/health/info:
    get:
      tags: [Health Info]
      summary: Get health information by topic or category
      parameters:
        - in: query
          name: topic
          schema:
            type: string
          example: period_pain
        - in: query
          name: category
          schema:
            type: string
            enum: [menstrual_health, pregnancy, sexual_consent, contraception, mental_wellbeing]
      responses:
        '200':
          description: Health information
          content:
            application/json:
              schema:
                type: object
                properties:
                  results:
                    type: array
                    items:
                      $ref: '#/components/schemas/KnowledgeEntry'

  /api/health/search:
    get:
      tags: [Health Info]
      summary: Search health knowledge base with AI-generated answer
      parameters:
        - in: query
          name: q
          required: true
          schema:
            type: string
          example: how to manage period pain
        - in: query
          name: category
          schema:
            type: string
      responses:
        '200':
          description: AI-generated answer with sources
          content:
            application/json:
              schema:
                type: object
                properties:
                  answer:
                    type: string
                  sources:
                    type: array
                    items:
                      type: object
                      properties:
                        title:
                          type: string
                        category:
                          type: string
                        topic:
                          type: string

components:
  schemas:
    ChatResponse:
      type: object
      properties:
        message:
          type: string
          description: Companion-style empathetic response
        scenario:
          type: string
          nullable: true
          enum: [PERIOD_FIRST_TIME, COLLEGE_HARASSMENT, EMOTIONAL_DISTRESS, DOMESTIC_VIOLENCE, FOLLOWED_IN_PUBLIC, MINOR_PREGNANCY]
          description: Matched scenario protocol ID, or null if no scenario matched
        tone:
          type: string
          enum: [warm_informative, gentle_supportive, calm_urgent, neutral_guidance]
          description: Response tone set by scenario or companion guide
          default: neutral_guidance
        category:
          type: string
          enum: [health, harassment, domestic_violence, mental_distress, relationship_issues, education, general]
        risk_level:
          type: string
          enum: [green, yellow, red]
          description: 'green=informational, yellow=distress, red=immediate danger'
        confidence:
          type: number
          minimum: 0
          maximum: 1
        steps:
          type: array
          items:
            type: string
          description: Ordered safety/action steps
        buttons:
          type: array
          items:
            $ref: '#/components/schemas/ActionButton'
        resources:
          type: array
          items:
            $ref: '#/components/schemas/SupportService'
        emergency:
          nullable: true
          $ref: '#/components/schemas/EmergencyResponse'

    ActionButton:
      type: object
      properties:
        label:
          type: string
          example: Call Women Helpline (181)
        action:
          type: string
          enum: [call, search_support, navigate, education]
        number:
          type: string
          example: '181'

    SupportService:
      type: object
      properties:
        name:
          type: string
        type:
          type: string
          enum: [hospital, police_station, women_helpline, ngo, counsellor, shelter]
        phone_number:
          type: string
        address:
          type: string
        operating_hours:
          type: string
        verified_status:
          type: boolean

    EmergencyResponse:
      type: object
      properties:
        emergency:
          type: boolean
        nearest_police:
          $ref: '#/components/schemas/SupportService'
        nearest_hospital:
          $ref: '#/components/schemas/SupportService'
        helpline_numbers:
          type: array
          items:
            type: object
            properties:
              name:
                type: string
              number:
                type: string
        timestamp:
          type: string

    KnowledgeEntry:
      type: object
      properties:
        topic:
          type: string
        category:
          type: string
        title:
          type: string
        content:
          type: string
        tags:
          type: array
          items:
            type: string
